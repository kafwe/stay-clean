<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>StayClean | Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2e8;
        --ink-strong: #443728;
        --ink-soft: #72624f;
        --line: rgba(108, 88, 67, 0.17);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: calc(1.25rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right))
          calc(1.25rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        background: var(--bg);
        color: var(--ink-strong);
        font-family: Outfit, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      }

      .card {
        width: min(100%, 28rem);
        border: 1px solid var(--line);
        border-radius: 1.15rem;
        background: rgba(255, 251, 245, 0.92);
        padding: 1rem 1.1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.15rem;
      }

      p {
        margin: 0.65rem 0 0;
        line-height: 1.5;
        color: var(--ink-soft);
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>You are offline</h1>
      <p>StayClean can still open cached screens. Reconnect to sync fresh bookings and schedule changes.</p>
    </article>
  </body>
</html>
